name: Release desktop installers

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Test
        run: npm test
      - name: Build Windows installer
        run: npm run dist:win
      - name: Generate CycloneDX SBOM
        shell: pwsh
        run: npm sbom --sbom-format cyclonedx | Set-Content -LiteralPath release/sbom.cdx.json -Encoding utf8
      - name: Attest Windows installer provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: "release/Jota-AI-Launcher-Setup-*.exe"
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: windows-release
          path: |
            release/Jota-AI-Launcher-Setup-*.exe
            release/Jota-AI-Launcher-Setup-*.exe.blockmap
            release/latest.yml
            release/sbom.cdx.json

  macos:
    runs-on: macos-15
    timeout-minutes: 40
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Test
        run: npm test
      - name: Build universal macOS installers
        run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - name: Attest macOS installer provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: "release/Jota-AI-Launcher-*.dmg"
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: macos-release
          path: |
            release/Jota-AI-Launcher-*.dmg
            release/Jota-AI-Launcher-*.zip
            release/Jota-AI-Launcher-*.blockmap
            release/latest-mac.yml

  publish:
    needs: [windows, macos]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          path: release
          merge-multiple: true
      - name: Create SHA-256 checksums
        working-directory: release
        run: sha256sum *.exe *.dmg *.zip > SHA256SUMS.txt
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            release/* \
            --repo "${{ github.repository }}" \
            --title "Jota AI Launcher ${{ github.ref_name }}" \
            --generate-notes \
            --verify-tag

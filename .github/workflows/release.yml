name: Release Windows installer

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build Windows installer
        run: npm run dist:win

      - name: Create SHA-256 checksum
        shell: pwsh
        run: |
          $installer = Get-ChildItem -LiteralPath release -Filter "Jota-AI-Launcher-Setup-*.exe" | Select-Object -First 1
          $hash = (Get-FileHash -LiteralPath $installer.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $($installer.Name)" | Set-Content -LiteralPath release/SHA256SUMS.txt -Encoding utf8

      - name: Generate CycloneDX SBOM
        shell: pwsh
        run: npm sbom --sbom-format cyclonedx | Set-Content -LiteralPath release/sbom.cdx.json -Encoding utf8

      - name: Attest installer provenance
        uses: actions/attest@v4
        with:
          subject-path: "release/Jota-AI-Launcher-Setup-*.exe"

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            release/Jota-AI-Launcher-Setup-*.exe `
            release/Jota-AI-Launcher-Setup-*.exe.blockmap `
            release/latest.yml `
            release/SHA256SUMS.txt `
            release/sbom.cdx.json `
            --title "Jota AI Launcher ${{ github.ref_name }}" `
            --generate-notes `
            --verify-tag

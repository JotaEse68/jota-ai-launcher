name: Release desktop installers

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Test
        run: npm test
      - name: Build Windows installer
        run: npm run dist:win
      - name: Generate CycloneDX SBOM
        shell: pwsh
        run: npm sbom --sbom-format cyclonedx | Set-Content -LiteralPath release/sbom.cdx.json -Encoding utf8
      - name: Attest Windows installer provenance
        uses: actions/attest@v4
        with:
          subject-path: "release/Jota-AI-Launcher-Setup-*.exe"
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v6
        with:
          name: windows-release
          path: |
            release/Jota-AI-Launcher-Setup-*.exe
            release/Jota-AI-Launcher-Setup-*.exe.blockmap
            release/latest.yml
            release/sbom.cdx.json

  macos:
    runs-on: macos-15
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Test
        run: npm test
      - name: Build universal macOS installers
        run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - name: Attest macOS installer provenance
        uses: actions/attest@v4
        with:
          subject-path: "release/Jota-AI-Launcher-*.dmg"
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v6
        with:
          name: macos-release
          path: |
            release/Jota-AI-Launcher-*.dmg
            release/Jota-AI-Launcher-*.zip
            release/Jota-AI-Launcher-*.blockmap
            release/latest-mac.yml

  publish:
    needs: [windows, macos]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          path: release
          merge-multiple: true
      - name: Create SHA-256 checksums
        working-directory: release
        run: sha256sum *.exe *.dmg *.zip > SHA256SUMS.txt
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            release/* \
            --repo "${{ github.repository }}" \
            --title "Jota AI Launcher ${{ github.ref_name }}" \
            --generate-notes \
            --verify-tag
